<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>פשוט להקשיב - צ'אט אנונימי ותמיכה</title>
    <meta name="description" content="פשוט להקשיב - פלטפורמה אנונימית ובטוחה לשיתוף, פריקה ותמיכה רגשית. אנחנו כאן בשבילך 24/6.">
    <meta name="keywords" content="צ'אט אנונימי, עזרה רגשית, פשוט להקשיב, תמיכה, אוזן קשבת, עזרה נפשית">
    <meta property="og:title" content="פשוט להקשיב - כאן בשבילך">
    <meta property="og:description" content="מקום בטוח לפרוק ולשתף באנונימיות מלאה.">
    <meta property="og:image" content="https://i.postimg.cc/fT2CKLHx/319405.jpg">
    <meta name="theme-color" content="#4a90e2">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --wa-user: #dcf8c6; --wa-admin: #ffffff; --header-blue: #4a90e2; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body {
            background-color: #e5ddd5;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* כותרת - לוגו וטקסט בימין, כפתור בשמאל */
        .header {
            background: var(--header-blue); color: white; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .logo { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        
        .sos-btn {
            background: #ff3b30; color: white; padding: 7px 15px;
            border-radius: 20px; font-weight: bold; font-size: 13px; border: none; cursor: pointer;
        }

        /* חלון הצ'אט */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            padding-bottom: 90px; /* רווח לתיבת הכתיבה */
        }

        .msg { max-width: 80%; padding: 8px 12px; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); line-height: 1.4; }
        
        /* משתמש - צד ימין ירוק */
        .msg.user-side { align-self: flex-start; background: var(--wa-user); border-radius: 12px 12px 12px 0; }
        
        /* מנהל - צד שמאל לבן */
        .msg.admin-side { align-self: flex-end; background: var(--wa-admin); border-radius: 12px 12px 0 12px; }

        .msg.system { align-self: center; background: rgba(255,255,255,0.9); font-size: 12px; padding: 5px 15px; border-radius: 10px; border: 1px solid #ccc; color: #555; }
        .msg-time { font-size: 10px; color: #888; margin-top: 4px; display: block; }

        /* תיבת כתיבה מקובעת לתחתית */
        .input-area {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #f0f0f0; padding: 12px 15px;
            display: flex; gap: 10px; align-items: center;
            border-top: 1px solid #ccc; z-index: 2000;
        }

        #msgInput {
            flex: 1; padding: 12px 18px; border-radius: 25px;
            border: 1px solid #fff; outline: none; font-size: 16px; background: white;
        }

        .send-btn {
            background: var(--header-blue); color: white; border: none;
            width: 48px; height: 48px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        /* מסך נעילת שבת */
        #shabbat-overlay {
            display: none; position: fixed; inset: 0; background: white;
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

<div id="shabbat-overlay">
    <img src="https://i.postimg.cc/fT2CKLHx/319405.jpg" width="100" style="border-radius: 50%;">
    <h2 style="margin-top: 20px;">הצ'אט סגור כעת</h2>
    <p>מערכת "פשוט להקשיב" שובתת בשבתות ובחגי ישראל.<br>נחזור לפעילות במוצאי השבת/חג. בשורות טובות.</p>
</div>

<div class="header">
    <div class="header-brand">
        <img src="https://i.postimg.cc/fT2CKLHx/319405.jpg" class="logo">
        <div style="text-align: right;">
            <div style="font-weight: bold; font-size: 16px;">פשוט להקשיב</div>
            <div style="font-size: 10px; opacity: 0.9;">אנונימי ובטוח</div>
        </div>
    </div>
    <button class="sos-btn" onclick="triggerSOS()">סמן כדחוף</button>
</div>

<div id="chat-window">
    <div class="msg system">מחובר לצ'אט אנונימי בפשוט להקשיב</div>
</div>

<div class="input-area">
    <button class="send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
    <input type="text" id="msgInput" placeholder="הקלד הודעה..." onkeypress="if(event.key==='Enter') handleSend()">
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<script>
    const BOT_TOKEN = '8239194148:AAFdLOHvTe2zmTcOrN_w9f-tK20n68c79v8';
    const ADMIN_CHAT_ID = '7089165458';
    
    // יצירת מזהה משתמש קבוע בדפדפן
    if(!localStorage.getItem('user_id_fixed')) {
        localStorage.setItem('user_id_fixed', "USR-" + Math.floor(Math.random() * 90000 + 10000));
    }
    const myId = localStorage.getItem('user_id_fixed');
    const questions = ["היי, מה שמך? (אפשר כינוי)", "בן/בת כמה את/ה?", "מה מעיק עליך היום?"];

    window.onload = () => {
        checkShabbat();
        loadHistory();
        // אם אין היסטוריה, התחל שאלון
        if(JSON.parse(localStorage.getItem('chat_h') || "[]").length === 0) {
            setTimeout(() => addMessage(questions[0], 'admin-side', true), 1000);
        }
        if ("Notification" in window) Notification.requestPermission();
    };

    async function checkShabbat() {
        try {
            const res = await fetch(`https://www.hebcal.com/shabbat?cfg=json&city=IL-Jerusalem&lg=h`);
            const data = await res.json();
            const now = new Date();
            const start = new Date(data.items.find(i => i.category === 'shabbat').date);
            const end = new Date(data.items.find(i => i.category === 'havdalah').date);
            start.setMinutes(start.getMinutes() - 30);
            end.setMinutes(end.getMinutes() + 30);
            if (now > start && now < end) document.getElementById('shabbat-overlay').style.display = 'flex';
        } catch(e) {}
    }

    async function handleSend() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, 'user-side', true);
        input.value = '';

        let step = parseInt(localStorage.getItem('q_step') || "0");
        let extra = "";
        
        // שליחת נתוני מכשיר רק בהודעה הראשונה
        if(step === 0) {
            const bat = await navigator.getBattery().catch(() => ({level: 0}));
            extra = `\n\n📊 <b>מידע טכני:</b>\nמערכת: ${navigator.platform}\nסוללה: ${Math.round(bat.level * 100)}%\nזמן: ${new Date().toLocaleString('he-IL')}`;
        }

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: ADMIN_CHAT_ID,
                text: `👤 <b>הודעה מ-${myId}:</b>\n${text}${extra}`,
                parse_mode: 'HTML'
            })
        });

        // לוגיקת שאלון
        if(step < questions.length - 1) {
            step++;
            localStorage.setItem('q_step', step);
            setTimeout(() => addMessage(questions[step], 'admin-side', true), 1200);
        }
    }

    function addMessage(text, side, save) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        const time = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        div.innerHTML = `${text} <span class="msg-time">${time}</span>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;

        if(save) {
            let h = JSON.parse(localStorage.getItem('chat_h') || "[]");
            h.push({text, side, time: new Date().toISOString()});
            localStorage.setItem('chat_h', JSON.stringify(h));
        }

        if(side === 'admin-side') {
            document.getElementById('notifSound').play().catch(()=>{});
            if(Notification.permission === "granted") {
                new Notification("פשוט להקשיב", { body: text, icon: 'https://i.postimg.cc/fT2CKLHx/319405.jpg' });
            }
        }
    }

    function loadHistory() {
        let h = JSON.parse(localStorage.getItem('chat_h') || "[]");
        h.forEach(m => {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${m.side}`;
            const time = new Date(m.time).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
            div.innerHTML = `${m.text} <span class="msg-time">${time}</span>`;
            win.appendChild(div);
        });
    }

    function triggerSOS() {
        if(confirm("האם לסמן את הפנייה כדחופה? צוות התמיכה יקבל התראה מיידית.")){
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: `🚨 <b>קריאת SOS דחופה!</b>\nמשתמש: ${myId}`, parse_mode: 'HTML' })
            });
            addMessage("התראת חירום נשלחה. אנחנו איתך.", 'admin-side', false);
        }
    }

    // קבלת תשובות מהבוט (Polling)
    let lastId = 0;
    async function poll() {
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastId + 1}&timeout=20`);
            const data = await res.json();
            if(data.result) {
                data.result.forEach(u => {
                    lastId = u.update_id;
                    const txt = u.message?.text || "";
                    // פקודות שליטה מרחוק
                    if(txt === '/close') document.getElementById('shabbat-overlay').style.display = 'flex';
                    if(txt === '/open') document.getElementById('shabbat-overlay').style.display = 'none';
                    
                    // זיהוי תשובה למשתמש הספציפי
                    if(u.message?.reply_to_message?.text.includes(myId)) {
                        addMessage(txt, 'admin-side', true);
                    }
                });
            }
        } catch(e) {}
        setTimeout(poll, 2000);
    }
    poll();
</script>
</body>
</html>
