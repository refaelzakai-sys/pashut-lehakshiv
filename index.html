<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פשוט להקשיב</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --wa-user: #dcf8c6; --wa-admin: #ffffff; 
            --header-blue: #4a90e2; --bg-pattern: #e5ddd5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: var(--bg-pattern);
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* כותרת - לוגו בימין, כפתור בשמאל */
        .header {
            background: var(--header-blue); color: white; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .logo { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; }
        .sos-btn {
            background: #ff3b30; color: white; padding: 7px 15px;
            border-radius: 20px; font-weight: bold; font-size: 13px; border: none; cursor: pointer;
        }

        /* רשימת משתמשים למנהל */
        #admin-bar {
            display: none; background: #fff; padding: 10px; border-bottom: 1px solid #ccc;
            overflow-x: auto; white-space: nowrap; gap: 8px;
        }
        .user-tab {
            padding: 6px 15px; background: #eee; border-radius: 20px; cursor: pointer; font-size: 13px;
        }
        .user-tab.active { background: var(--header-blue); color: white; }

        /* צ'אט */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 8px 12px; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        /* עיצוב בועות לפי צדדים */
        .msg.user-side { align-self: flex-start; background: var(--wa-user); border-radius: 12px 12px 12px 0; }
        .msg.admin-side { align-self: flex-end; background: var(--wa-admin); border-radius: 12px 12px 0 12px; }
        .msg.system { align-self: center; background: rgba(255,255,255,0.9); font-size: 12px; padding: 4px 12px; border-radius: 10px; border: 1px solid #ddd; }
        
        .msg-time { font-size: 10px; color: #888; margin-top: 4px; display: block; }

        /* כתיבה */
        .input-box { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ccc; }
        #msgInput { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #fff; outline: none; font-size: 16px; }
        .send-btn { background: var(--header-blue); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        #shabbat-lock {
            display: none; position: fixed; inset: 0; background: white; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

<div id="shabbat-lock">
    <img src="https://i.postimg.cc/fT2CKLHx/319405.jpg" width="100" style="border-radius: 50%">
    <h2 style="margin-top:20px">הצ'אט סגור כעת</h2>
    <p>נחזור לפעילות במוצאי השבת/חג. בשורות טובות.</p>
</div>

<div id="admin-bar"></div>

<div class="header">
    <div class="header-brand">
        <img src="https://i.postimg.cc/fT2CKLHx/319405.jpg" class="logo">
        <div>
            <div style="font-weight: bold; font-size: 16px;">פשוט להקשיב</div>
            <div style="font-size: 10px; opacity: 0.9;">אנונימי ובטוח</div>
        </div>
    </div>
    <button class="sos-btn" id="sos-btn" onclick="askSOS()">סמן כדחוף</button>
</div>

<div id="chat-window">
    <div class="msg system">מחובר לצ'אט אנונימי בפשוט להקשיב</div>
</div>

<div class="input-box">
    <button class="send-btn" onclick="handleAction()"><i class="fas fa-paper-plane"></i></button>
    <input type="text" id="msgInput" placeholder="הקלד הודעה..." onkeypress="if(event.key==='Enter') handleAction()">
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<script>
    const BOT_TOKEN = '8239194148:AAFdLOHvTe2zmTcOrN_w9f-tK20n68c79v8';
    const ADMIN_ID = '7089165458';
    const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
    
    if(!localStorage.getItem('u_id')) localStorage.setItem('u_id', "USR-" + Math.floor(Math.random()*90000+10000));
    const myId = localStorage.getItem('u_id');
    let activeChat = isAdmin ? "" : myId;

    const questions = ["היי, מה שמך? (אפשר כינוי)", "בן/בת כמה את/ה?", "מה מעיק עליך היום?"];

    window.onload = () => {
        checkTime();
        loadLocalHistory();
        if(isAdmin) {
            document.getElementById('admin-bar').style.display = 'flex';
            document.getElementById('sos-btn').style.display = 'none';
        } else if(JSON.parse(localStorage.getItem('h') || "[]").length === 0) {
            setTimeout(() => addMsg(questions[0], 'admin-side', true), 1000);
        }
        if("Notification" in window) Notification.requestPermission();
    };

    async function checkTime() {
        try {
            const res = await fetch(`https://www.hebcal.com/shabbat?cfg=json&city=IL-Jerusalem&lg=h`);
            const data = await res.json();
            const now = new Date();
            const start = new Date(data.items.find(i => i.category === 'shabbat').date);
            const end = new Date(data.items.find(i => i.category === 'havdalah').date);
            start.setMinutes(start.getMinutes() - 30);
            end.setMinutes(end.getMinutes() + 30);
            if(now > start && now < end) document.getElementById('shabbat-lock').style.display = 'flex';
        } catch(e) {}
    }

    async function handleAction() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text || (isAdmin && !activeChat)) return;

        addMsg(text, isAdmin ? 'admin-side' : 'user-side', true);
        input.value = '';

        let qIdx = parseInt(localStorage.getItem('qi') || "0");
        let stats = "";
        if(!isAdmin && qIdx === 0) {
            const bat = await navigator.getBattery().catch(()=>({level:0}));
            stats = `\n\n📊 <b>פרטים:</b> ${navigator.platform} | סוללה: ${Math.round(bat.level*100)}% | ${new Date().toLocaleString('he-IL')}`;
        }

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                chat_id: ADMIN_ID,
                text: isAdmin ? `📩 <b>תשובה ל-${activeChat}:</b>\n${text}` : `👤 <b>הודעה מ-${myId}:</b>\n${text}${stats}`,
                parse_mode: 'HTML'
            })
        });

        if(!isAdmin && qIdx < questions.length - 1) {
            qIdx++; localStorage.setItem('qi', qIdx);
            setTimeout(() => addMsg(questions[qIdx], 'admin-side', true), 1200);
        }
    }

    function addMsg(text, side, save) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        const t = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        div.innerHTML = `${text} <span class="msg-time">${t}</span>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;

        if(save) {
            let h = JSON.parse(localStorage.getItem('h') || "[]");
            h.push({text, side, t: new Date().toISOString()});
            localStorage.setItem('h', JSON.stringify(h));
        }
        if(side === 'admin-side' && !isAdmin) {
            document.getElementById('notifSound').play().catch(()=>{});
            if(Notification.permission === "granted") new Notification("פשוט להקשיב", {body: text});
        }
    }

    function loadLocalHistory() {
        let h = JSON.parse(localStorage.getItem('h') || "[]");
        h.forEach(m => {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${m.side}`;
            const t = new Date(m.t).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
            div.innerHTML = `${m.text} <span class="msg-time">${t}</span>`;
            win.appendChild(div);
        });
    }

    function askSOS() {
        if(confirm("האם זהו מצב חירום?")){
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: ADMIN_ID, text: `🚨 <b>SOS!</b> משתמש: ${myId}`, parse_mode: 'HTML' })
            });
            addMsg("התראה דחופה נשלחה. אנחנו איתך.", 'admin-side', false);
        }
    }

    let lastU = 0;
    async function poll() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastU+1}&timeout=20`);
            const d = await r.json();
            if(d.result) {
                d.result.forEach(u => {
                    lastU = u.update_id;
                    const txt = u.message?.text || "";
                    if(txt === '/close') document.getElementById('shabbat-lock').style.display = 'flex';
                    if(txt === '/open') document.getElementById('shabbat-lock').style.display = 'none';

                    if(isAdmin) {
                        if(txt.includes("USR-")) {
                            const id = txt.match(/USR-\d+/)[0];
                            updateTabs(id);
                            if(activeChat === id) addMsg(txt, 'user-side', false);
                        }
                    } else if(u.message?.reply_to_message?.text.includes(myId)) {
                        addMsg(txt, 'admin-side', true);
                    }
                });
            }
        } catch(e) {}
        setTimeout(poll, 2000);
    }

    function updateTabs(id) {
        const bar = document.getElementById('admin-bar');
        if(!document.getElementById('t-'+id)) {
            const b = document.createElement('div');
            b.id = 't-'+id; b.className = 'user-tab'; b.innerText = id;
            b.onclick = () => {
                document.querySelectorAll('.user-tab').forEach(x=>x.classList.remove('active'));
                b.classList.add('active'); activeChat = id;
                document.getElementById('chat-window').innerHTML = `<div class="msg system">צ'אט עם ${id}</div>`;
            };
            bar.appendChild(b);
        }
    }
    poll();
</script>
</body>
</html>
